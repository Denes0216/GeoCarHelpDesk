<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>US License Plates</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQK5NLyJkQRfJj8Y8t8W56n7nD6iW3w="
      crossorigin=""
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell app-shell--plates">
      <section class="map-panel" aria-label="US states map">
        <div class="topbar">
          <div>
            <h1>US Plates</h1>
            <p>Select a state to see its license plates.</p>
          </div>
          <div class="top-actions">
            <a class="nav-link" href="filters.html">Filters</a>
            <a class="nav-link" href="game.html">Game</a>
            <a class="nav-link" href="index.html">Map</a>
          </div>
        </div>
        <div id="usMap"></div>
      </section>

      <aside class="vehicle-panel" id="platePanel" aria-live="polite">
        <button class="sheet-handle" id="sheetHandle" type="button" aria-label="Toggle plates panel">
          <span></span>
        </button>

        <div class="plates-filter-section">
          <div class="plates-filter-row">
            <button class="plate-filter-btn is-active" data-color="all">All colors</button>
            <button class="plate-filter-btn" data-color="white">
              <span class="pfb-swatch" style="background:#e8e8e8;border-color:rgba(255,255,255,0.3)"></span>White
            </button>
            <button class="plate-filter-btn" data-color="yellow">
              <span class="pfb-swatch" style="background:#f5c518"></span>Yellow
            </button>
            <button class="plate-filter-btn" data-color="blue">
              <span class="pfb-swatch" style="background:#2979c8"></span>Blue
            </button>
            <button class="plate-filter-btn" data-color="green">
              <span class="pfb-swatch" style="background:#3ea060"></span>Green
            </button>
            <button class="plate-filter-btn" data-color="red">
              <span class="pfb-swatch" style="background:#d63c3c"></span>Red
            </button>
            <button class="plate-filter-btn" data-color="multicolor">
              <span class="pfb-swatch pfb-swatch--multi"></span>Scenic
            </button>
          </div>
        </div>

        <div class="panel-heading">
          <div>
            <p class="eyebrow">Plates</p>
            <h2>All matching</h2>
          </div>
          <span id="plateCount" class="count">— plates</span>
        </div>

        <div id="stateGallery" class="gallery plates-gallery"></div>
      </aside>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="us-plates-data.js"></script>
    <script src="us-plates.js"></script>
  </body>
</html>
