<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Google Car Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQK5NLyJkQRfJj8Y8t8W56n7nD6iW3w="
      crossorigin=""
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="map-panel" aria-label="World map">
        <div class="topbar">
          <div>
            <h1>Google Car Map</h1>
            <p>Click a country or territory to see the scraped GeoHints vehicle photos.</p>
          </div>
          <div class="top-actions">
            <a class="nav-link" href="filters.html">Country filters</a>
            <span class="nav-link-wrap">
          <a class="nav-link" href="game.html">Game</a>
          <span class="nav-new-badge">new</span>
        </span>
            <div class="stat" id="coverageStat">Loading data...</div>
          </div>
        </div>
        <div id="map"></div>
      </section>

      <aside class="vehicle-panel" id="vehiclePanel" aria-live="polite">
        <button class="sheet-handle" id="sheetHandle" type="button" aria-label="Toggle vehicle photos panel">
          <span></span>
        </button>
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Selected country</p>
            <h2 id="countryName">Click the map</h2>
          </div>
          <span id="vehicleCount" class="count">0 cars</span>
        </div>

        <div id="placeFilters" class="place-filters" hidden></div>
        <div id="gallery" class="gallery" hidden></div>
      </aside>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="cars-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
